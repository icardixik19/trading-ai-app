<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading AI Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0f0f1a;
  --bg3: #16162a;
  --border: rgba(120,120,255,0.1);
  --border2: rgba(120,120,255,0.2);
  --text: #e2e2f0;
  --muted: #6060a0;
  --green: #00e676;
  --red: #ff5252;
  --yellow: #ffea00;
  --blue: #448aff;
  --purple: #7c4dff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 24px; background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.logo { font-family:'Space Mono',monospace; font-size:14px; font-weight:700; color:var(--purple); letter-spacing:3px; }
.header-right { display:flex; align-items:center; gap:16px; }
.live-badge {
  display:flex; align-items:center; gap:6px;
  font-size:11px; font-family:'Space Mono',monospace; color:var(--green);
}
.dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.container { max-width:1100px; margin:0 auto; padding:24px 16px; }

.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.stat-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; padding:16px 18px;
}
.stat-label { font-size:10px; font-family:'Space Mono',monospace; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.stat-value { font-size:22px; font-weight:600; }

.section { margin-bottom:24px; }
.section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.section-title { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

.coins-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.coin-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; padding:16px 18px;
  cursor:pointer; transition:border-color 0.2s, transform 0.1s;
}
.coin-card:hover { border-color:var(--border2); transform:translateY(-1px); }
.coin-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.coin-sym { font-family:'Space Mono',monospace; font-weight:700; font-size:15px; }
.coin-name { font-size:11px; color:var(--muted); margin-top:2px; }
.badge {
  font-size:10px; font-weight:700; padding:4px 10px;
  border-radius:20px; font-family:'Space Mono',monospace; letter-spacing:1px;
}
.badge-buy { background:rgba(0,230,118,0.15); color:var(--green); border:1px solid rgba(0,230,118,0.3); }
.badge-sell { background:rgba(255,82,82,0.15); color:var(--red); border:1px solid rgba(255,82,82,0.3); }
.badge-wait { background:rgba(255,234,0,0.1); color:var(--yellow); border:1px solid rgba(255,234,0,0.2); }
.badge-opp { background:rgba(68,138,255,0.15); color:var(--blue); border:1px solid rgba(68,138,255,0.3); }
.coin-price { font-size:18px; font-weight:600; margin-bottom:6px; }
.coin-change { font-size:12px; }
.rsi-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.rsi-label { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; width:28px; }
.rsi-track { flex:1; height:4px; background:var(--bg3); border-radius:2px; }
.rsi-fill { height:4px; border-radius:2px; transition:width 0.5s; }
.rsi-val { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; width:24px; text-align:right; }
.coin-reason { font-size:11px; color:var(--muted); margin-top:8px; font-style:italic; }
.trend-row { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
.tag {
  font-size:10px; padding:2px 8px; border-radius:10px;
  background:var(--bg3); color:var(--muted);
  font-family:'Space Mono',monospace;
}

.signals-list { display:flex; flex-direction:column; gap:8px; }
.signal-item {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:12px 16px;
  display:flex; align-items:center; gap:12px;
}
.signal-icon { font-size:18px; }
.signal-body { flex:1; }
.signal-title { font-size:13px; font-weight:500; }
.signal-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.signal-time { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; white-space:nowrap; }

.actions-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
.btn {
  padding:10px 18px; border-radius:10px; font-size:13px;
  font-family:'DM Sans',sans-serif; font-weight:500;
  cursor:pointer; border:none; transition:all 0.2s;
}
.btn-primary { background:var(--purple); color:white; }
.btn-primary:hover { opacity:0.85; }
.btn-outline { background:transparent; border:1px solid var(--border2); color:var(--text); }
.btn-outline:hover { background:var(--bg3); }
.btn-green { background:rgba(0,230,118,0.15); color:var(--green); border:1px solid rgba(0,230,118,0.3); }
.btn-green:hover { background:rgba(0,230,118,0.25); }

.telegram-section {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; padding:20px;
  margin-bottom:24px;
}
.tg-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
.tg-input {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:10px 14px;
  color:var(--text); font-family:'Space Mono',monospace; font-size:12px;
  width:100%; outline:none;
}
.tg-input:focus { border-color:var(--purple); }
.tg-label { font-size:11px; color:var(--muted); margin-bottom:6px; font-family:'Space Mono',monospace; }

.empty { text-align:center; padding:32px; color:var(--muted); font-size:13px; }
.loading { text-align:center; padding:32px; color:var(--muted); font-family:'Space Mono',monospace; font-size:12px; }

@media(max-width:600px) {
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .coins-grid { grid-template-columns:1fr; }
  .tg-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">⬡ TRADING AI</div>
  <div class="header-right">
    <div class="live-badge"><span class="dot"></span><span id="scan-time">Bağlanıyor...</span></div>
    <button class="btn btn-outline" style="padding:6px 14px;font-size:12px" onclick="scanAll()">↻ Yenile</button>
  </div>
</header>

<div class="container">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">BTC Fiyat</div>
      <div class="stat-value" id="stat-btc" style="color:var(--yellow)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ETH Fiyat</div>
      <div class="stat-value" id="stat-eth" style="color:var(--blue)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Al Sinyali</div>
      <div class="stat-value" id="stat-buy" style="color:var(--green)">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Toplam Sinyal</div>
      <div class="stat-value" id="stat-total" style="color:var(--purple)">0</div>
    </div>
  </div>

  <div class="telegram-section">
    <div class="section-title">Telegram Ayarları</div>
    <div class="tg-grid">
      <div>
        <div class="tg-label">BOT TOKEN</div>
        <input class="tg-input" id="tg-token" placeholder="1234567890:AAFxxx..." />
      </div>
      <div>
        <div class="tg-label">CHAT ID</div>
        <input class="tg-input" id="tg-chat" placeholder="123456789" />
      </div>
    </div>
    <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="saveTelegram()">💾 Kaydet</button>
      <button class="btn btn-green" onclick="testTelegram()">🔔 Test Mesajı Gönder</button>
      <button class="btn btn-outline" onclick="sendReport()">📊 Analiz Raporunu Gönder</button>
    </div>
  </div>

  <div class="actions-row">
    <button class="btn btn-primary" onclick="autoScan()">▶ Otomatik Tarama Başlat</button>
    <button class="btn btn-outline" id="stop-btn" onclick="stopScan()" style="display:none">⏹ Durdur</button>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Coin Analizi</div>
      <div id="coin-count" style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace"></div>
    </div>
    <div class="coins-grid" id="coins-grid">
      <div class="loading">Veriler yükleniyor...</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Sinyal Geçmişi</div>
      <button class="btn btn-outline" style="padding:4px 12px;font-size:11px" onclick="clearSignals()">Temizle</button>
    </div>
    <div class="signals-list" id="signals-list">
      <div class="empty">Henüz sinyal yok. Sistem veri topluyor...</div>
    </div>
  </div>

</div>

<script>
const COINS = [
  {id:"bitcoin",sym:"BTC",name:"Bitcoin"},
  {id:"ethereum",sym:"ETH",name:"Ethereum"},
  {id:"solana",sym:"SOL",name:"Solana"},
  {id:"binancecoin",sym:"BNB",name:"BNB"},
  {id:"ripple",sym:"XRP",name:"Ripple"},
  {id:"dogecoin",sym:"DOGE",name:"Dogecoin"},
  {id:"cardano",sym:"ADA",name:"Cardano"},
  {id:"avalanche-2",sym:"AVAX",name:"Avalanche"},
  {id:"chainlink",sym:"LINK",name:"Chainlink"},
  {id:"polkadot",sym:"DOT",name:"Polkadot"}
];

let priceHistory = {};
let signals = JSON.parse(localStorage.getItem("tg_signals") || "[]");
let scanTimer = null;
let coinData = {};

COINS.forEach(c => priceHistory[c.id] = []);

function saveTelegram() {
  localStorage.setItem("tg_token", document.getElementById("tg-token").value);
  localStorage.setItem("tg_chat", document.getElementById("tg-chat").value);
  alert("Kaydedildi!");
}

function loadTelegram() {
  const t = localStorage.getItem("tg_token") || "";
  const c = localStorage.getItem("tg_chat") || "";
  document.getElementById("tg-token").value = t;
  document.getElementById("tg-chat").value = c;
}

async function sendTelegram(msg) {
  const token = localStorage.getItem("tg_token");
  const chat = localStorage.getItem("tg_chat");
  if (!token || !chat) return;
  try {
    await fetch("https://api.telegram.org/bot" + token + "/sendMessage", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({chat_id: chat, text: msg, parse_mode:"Markdown"})
    });
  } catch(e) {}
}

async function testTelegram() {
  await sendTelegram("✅ *Trading AI Bot Aktif!*\nWeb uygulaması çalışıyor.");
  alert("Test mesajı gönderildi!");
}

function calcEMA(prices, period) {
  if (prices.length < period) return [];
  const k = 2 / (period + 1);
  let result = [prices.slice(0, period).reduce((a,b)=>a+b,0) / period];
  for (let i = period; i < prices.length; i++) {
    result.push(prices[i] * k + result[result.length-1] * (1-k));
  }
  return result;
}

function calcRSI(prices, period=14) {
  if (prices.length < period+1) return 50;
  let gains=[], losses=[];
  for (let i=1; i<prices.length; i++) {
    const d = prices[i]-prices[i-1];
    gains.push(Math.max(d,0));
    losses.push(Math.max(-d,0));
  }
  const ag = gains.slice(-period).reduce((a,b)=>a+b,0)/period;
  const al = losses.slice(-period).reduce((a,b)=>a+b,0)/period;
  if (al===0) return 100;
  return 100 - (100/(1+ag/al));
}

function getTrend(prices) {
  if (prices.length < 10) return "belirsiz";
  const s1 = prices.slice(-10,-5).reduce((a,b)=>a+b,0)/5;
  const s2 = prices.slice(-5).reduce((a,b)=>a+b,0)/5;
  const d = (s2-s1)/s1*100;
  if (d>1) return "yukari";
  if (d<-1) return "asagi";
  return "yatay";
}

function analyze(coin, price) {
  const h = priceHistory[coin.id];
  h.push(price);
  if (h.length > 100) h.shift();

  const rsi = calcRSI(h.slice(-20));
  const trend = getTrend(h);
  const ema9 = calcEMA(h, 9);
  const ema21 = calcEMA(h, 21);

  let signal = "bekle", reason = "Net sinyal yok, RSI " + rsi.toFixed(1);

  if (ema9.length >= 2 && ema21.length >= 2) {
    const crossUp = ema9[ema9.length-2] < ema21[ema21.length-2] && ema9[ema9.length-1] > ema21[ema21.length-1];
    const crossDown = ema9[ema9.length-2] > ema21[ema21.length-2] && ema9[ema9.length-1] < ema21[ema21.length-1];
    if (crossUp && rsi < 70) { signal="al"; reason="EMA kesişimi yukarı + RSI "+rsi.toFixed(1); }
    else if (rsi < 30) { signal="al"; reason="Aşırı satım RSI "+rsi.toFixed(1); }
    else if (crossDown && rsi > 30) { signal="sat"; reason="EMA kesişimi aşağı + RSI "+rsi.toFixed(1); }
    else if (rsi > 75) { signal="sat"; reason="Aşırı alım RSI "+rsi.toFixed(1); }
    else if (rsi < 40 && trend==="yukari") { signal="al_firsati"; reason="Düşük RSI + yukarı trend"; }
  }

  return { signal, reason, rsi: parseFloat(rsi.toFixed(1)), trend,
           price, sl: parseFloat((price*0.98).toFixed(6)), tp: parseFloat((price*1.04).toFixed(6)) };
}

async function fetchPrices() {
  const ids = COINS.map(c=>c.id).join(",");
  const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids="+ids+"&vs_currencies=usd&include_24hr_change=true");
  return r.json();
}

async function scanAll() {
  document.getElementById("scan-time").textContent = "Taranıyor...";
  try {
    const data = await fetchPrices();
    coinData = data;
    renderCoins(data);
    const now = new Date().toLocaleTimeString("tr-TR");
    document.getElementById("scan-time").textContent = "Son: "+now;
  } catch(e) {
    document.getElementById("scan-time").textContent = "Hata — tekrar dene";
  }
}

function renderCoins(data) {
  let buys=0, html="";
  const sigLabels = {al:"AL",sat:"SAT",bekle:"BEKLE",al_firsati:"AL FIRSATI"};
  const sigClass = {al:"badge-buy",sat:"badge-sell",bekle:"badge-wait",al_firsati:"badge-opp"};
  const trendArrow = {yukari:"↑ Yukarı",asagi:"↓ Aşağı",yatay:"→ Yatay",belirsiz:"? Belirsiz"};
  const rsiColor = r => r<30?"#00e676":r>70?"#ff5252":"#ffea00";

  let btc=0, eth=0;
  COINS.forEach(coin => {
    if (!data[coin.id]) return;
    const price = data[coin.id].usd;
    const change = data[coin.id].usd_24h_change || 0;
    const result = analyze(coin, price);
    if (result.signal==="al") buys++;
    if (coin.id==="bitcoin") btc=price;
    if (coin.id==="ethereum") eth=price;

    if (result.signal==="al" || result.signal==="sat") {
      const existing = signals.find(s=>s.sym===coin.sym && s.signal===result.signal);
      if (!existing || (Date.now()-new Date(existing.time).getTime()) > 300000) {
        const entry = {sym:coin.sym,signal:result.signal,price,rsi:result.rsi,reason:result.reason,time:new Date().toISOString()};
        signals.unshift(entry);
        if (signals.length>50) signals.pop();
        localStorage.setItem("tg_signals", JSON.stringify(signals));
        const emoji = result.signal==="al"?"🟢":"🔴";
        sendTelegram(emoji+" *"+result.signal.toUpperCase()+" SİNYALİ*\nCoin: `"+coin.sym+"`\nFiyat: `$"+price+"`\nRSI: `"+result.rsi+"`\nSebep: _"+result.reason+"_\nSL: `$"+result.sl+"` | TP: `$"+result.tp+"`");
      }
    }

    html += `<div class="coin-card">
      <div class="coin-head">
        <div><div class="coin-sym">${coin.sym}</div><div class="coin-name">${coin.name}</div></div>
        <span class="badge ${sigClass[result.signal]}">${sigLabels[result.signal]}</span>
      </div>
      <div class="coin-price">$${price.toLocaleString("tr-TR",{maximumFractionDigits:6})}</div>
      <div class="coin-change" style="color:${change>=0?'var(--green)':'var(--red)'}">${change>=0?'+':''}${change.toFixed(2)}% (24s)</div>
      <div class="rsi-row">
        <span class="rsi-label">RSI</span>
        <div class="rsi-track"><div class="rsi-fill" style="width:${result.rsi}%;background:${rsiColor(result.rsi)}"></div></div>
        <span class="rsi-val">${result.rsi}</span>
      </div>
      <div class="trend-row">
        <span class="tag">${trendArrow[result.trend]}</span>
        <span class="tag">SL $${result.sl}</span>
        <span class="tag">TP $${result.tp}</span>
      </div>
      <div class="coin-reason">${result.reason}</div>
    </div>`;
  });

  document.getElementById("coins-grid").innerHTML = html || '<div class="empty">Veri yüklenemedi</div>';
  document.getElementById("stat-btc").textContent = btc ? "$"+btc.toLocaleString("tr-TR",{maximumFractionDigits:0}) : "—";
  document.getElementById("stat-eth").textContent = eth ? "$"+eth.toLocaleString("tr-TR",{maximumFractionDigits:0}) : "—";
  document.getElementById("stat-buy").textContent = buys;
  document.getElementById("stat-total").textContent = signals.length;
  document.getElementById("coin-count").textContent = COINS.length+" coin";
  renderSignals();
}

function renderSignals() {
  if (signals.length===0) {
    document.getElementById("signals-list").innerHTML = '<div class="empty">Henüz sinyal yok</div>';
    return;
  }
  const html = signals.slice(0,20).map(s=>{
    const emoji = s.signal==="al"?"🟢":"🔴";
    const t = new Date(s.time).toLocaleString("tr-TR");
    return `<div class="signal-item">
      <div class="signal-icon">${emoji}</div>
      <div class="signal-body">
        <div class="signal-title">${s.sym} — ${s.signal.toUpperCase()} @ $${s.price}</div>
        <div class="signal-sub">RSI ${s.rsi} · ${s.reason}</div>
      </div>
      <div class="signal-time">${t}</div>
    </div>`;
  }).join("");
  document.getElementById("signals-list").innerHTML = html;
  document.getElementById("stat-total").textContent = signals.length;
}

function clearSignals() {
  signals = [];
  localStorage.removeItem("tg_signals");
  renderSignals();
}

async function sendReport() {
  if (!coinData || Object.keys(coinData).length===0) { alert("Önce yenile!"); return; }
  let msg = "📊 *TRADING AI RAPORU*\n"+new Date().toLocaleString("tr-TR")+"\n─────────────\n";
  const sigLabels = {al:"AL 🟢",sat:"SAT 🔴",bekle:"BEKLE 🟡",al_firsati:"AL FIRSATI 🔵"};
  COINS.forEach(coin => {
    if (!coinData[coin.id]) return;
    const price = coinData[coin.id].usd;
    const h = priceHistory[coin.id];
    const rsi = calcRSI(h.slice(-20));
    const trend = getTrend(h);
    const ema9 = calcEMA(h,9), ema21 = calcEMA(h,21);
    let signal = "bekle";
    if (ema9.length>=2&&ema21.length>=2) {
      if (ema9[ema9.length-2]<ema21[ema21.length-2]&&ema9[ema9.length-1]>ema21[ema21.length-1]&&rsi<70) signal="al";
      else if (rsi<30) signal="al";
      else if (ema9[ema9.length-2]>ema21[ema21.length-2]&&ema9[ema9.length-1]<ema21[ema21.length-1]&&rsi>30) signal="sat";
      else if (rsi>75) signal="sat";
    }
    msg += "*"+coin.sym+"*: $"+price+" | RSI "+rsi.toFixed(1)+" | "+(sigLabels[signal]||"BEKLE")+"\n";
  });
  msg += "─────────────\n_Trading AI Web App_";
  await sendTelegram(msg);
  alert("Rapor gönderildi!");
}

let autoTimer = null;
function autoScan() {
  scanAll();
  autoTimer = setInterval(scanAll, 60000);
  document.querySelector('.btn-primary').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'inline-block';
}
function stopScan() {
  clearInterval(autoTimer);
  document.querySelector('.btn-primary').style.display = 'inline-block';
  document.getElementById('stop-btn').style.display = 'none';
}

loadTelegram();
scanAll();
</script>
</body>
</html>
